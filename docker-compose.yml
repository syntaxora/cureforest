version: '3.8'

services:
  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cureforest-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cureforest}:${POSTGRES_PASSWORD:-cureforest123}@postgres:5432/${POSTGRES_DB:-cureforest}
      - ADMIN_SESSION_SECRET=${ADMIN_SESSION_SECRET:-cureforest-admin-secret-key-change-in-production}
      - HOSTNAME=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy

  # PostgreSQL Database (port 5433 to avoid conflicts)
  postgres:
    image: postgres:16-alpine
    container_name: cureforest-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cureforest}
      POSTGRES_USER: ${POSTGRES_USER:-cureforest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cureforest123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cureforest} -d ${POSTGRES_DB:-cureforest}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  postgres_data:
    name: cureforest_postgres_data
